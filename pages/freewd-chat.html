<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>社区姬 · Freewd AI助手</title>
    <!-- Markdown 解析 & XSS 清理 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            background: #ffffff;
            padding: 0.8rem 1.25rem;
            border-bottom: 1px solid #e9eef3;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.96);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .header-title {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1e2a3e;
            letter-spacing: -0.2px;
        }

        .header-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: #eef2f8;
            border: none;
            color: #2c3e50;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .icon-btn:active {
            transform: scale(0.96);
        }

        /* 模型选择下拉框 */
        .model-selector {
            background: #eef2f8;
            border: none;
            border-radius: 2rem;
            padding: 0.45rem 1rem;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            color: #1e2a3e;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        .model-selector:focus {
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(30,58,95,0.2);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #fafcff;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        .user-message {
            align-self: flex-end;
        }

        .assistant-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.8rem 1rem;
            border-radius: 1.5rem;
            line-height: 1.45;
            font-size: 0.95rem;
            word-break: break-word;
            white-space: normal;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

        .assistant-bubble {
            background: #eef2f8;
            color: #1f2a3e;
            border-bottom-left-radius: 0.25rem;
            overflow-x: auto;
        }
        .assistant-bubble h1, .assistant-bubble h2, .assistant-bubble h3,
        .assistant-bubble h4, .assistant-bubble h5, .assistant-bubble h6 {
            margin: 0.5em 0 0.25em;
            font-weight: 600;
            line-height: 1.3;
        }
        .assistant-bubble h1 { font-size: 1.3rem; }
        .assistant-bubble h2 { font-size: 1.2rem; }
        .assistant-bubble h3 { font-size: 1.1rem; }
        .assistant-bubble p { margin: 0.4em 0; }
        .assistant-bubble ul, .assistant-bubble ol { margin: 0.4em 0; padding-left: 1.5rem; }
        .assistant-bubble li { margin: 0.2em 0; }
        .assistant-bubble code {
            background: #e2e8f0;
            padding: 0.2rem 0.3rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            color: #d0312d;
        }
        .assistant-bubble pre {
            background: #1e2a3a;
            color: #eef2f8;
            padding: 0.75rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.6em 0;
        }
        .assistant-bubble pre code { background: transparent; color: inherit; padding: 0; }
        .assistant-bubble blockquote { border-left: 3px solid #8a99b0; margin: 0.5em 0; padding-left: 0.8rem; color: #4b5e77; }
        .assistant-bubble a { color: #1e3a5f; text-decoration: underline; }
        .assistant-bubble table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
        .assistant-bubble th, .assistant-bubble td { border: 1px solid #cbd5e1; padding: 0.4rem; text-align: left; }
        .assistant-bubble th { background: #e2e8f0; }
        .assistant-bubble img { max-width: 100%; border-radius: 8px; }

        .user-bubble {
            background: #1e3a5f;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message-meta {
            font-size: 0.7rem;
            margin-top: 0.25rem;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
            color: #8a99b0;
        }

        .thinking {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .dot-pulse {
            display: inline-flex;
            gap: 3px;
        }
        .dot-pulse span {
            width: 6px;
            height: 6px;
            background-color: #6c7a8e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .dot-pulse span:nth-child(1) { animation-delay: 0s; }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 60%, 100% { transform: scale(0.8); opacity: 0.5; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .input-area {
            background: #ffffff;
            border-top: 1px solid #e9eef3;
            padding: 0.8rem 1rem 1rem 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f2f5f9;
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #1e3a5f;
            background: #ffffff;
            box-shadow: 0 0 0 2px rgba(30,58,95,0.1);
        }

        textarea {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.4;
            max-height: 120px;
            color: #1e2a3e;
        }

        textarea::placeholder {
            color: #9aaebb;
        }

        .action-buttons {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }

        button {
            background: #1e3a5f;
            border: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.65rem 1.1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        button:active { transform: scale(0.96); }
        button:disabled { background: #b9c4d1; cursor: not-allowed; opacity: 0.7; }
        .clear-btn { background: #eef2f8; color: #3a546d; border: 1px solid #dce3ec; }
        .error-tip { background: #fee9e6; color: #c2410c; font-size: 0.75rem; padding: 0.4rem 0.8rem; border-radius: 1rem; margin: 0 1rem 0.5rem 1rem; text-align: center; }

        /* 历史模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            max-height: 70vh;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 1rem;
            border-bottom: 1px solid #e9eef3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        .history-item {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .history-info {
            flex: 1;
            cursor: pointer;
        }
        .history-title {
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e2a3e;
        }
        .history-time {
            font-size: 0.7rem;
            color: #8a99b0;
            margin-top: 0.2rem;
        }
        .history-actions {
            display: flex;
            gap: 0.5rem;
        }
        .history-actions button {
            background: #eef2f8;
            color: #3a546d;
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
        }
        .modal-footer {
            padding: 0.8rem;
            border-top: 1px solid #e9eef3;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .close-modal {
            background: #eef2f8;
            color: #1e2a3e;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (min-width: 768px) {
            .chat-container { height: 90vh; border-radius: 28px; margin: 1.5rem; }
            .message { max-width: 75%; }
            .bubble { font-size: 1rem; padding: 0.85rem 1.2rem; }
        }
        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .bubble { font-size: 0.9rem; padding: 0.65rem 0.9rem; }
            .icon-btn, .model-selector { padding: 0.4rem 0.7rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="header-title">Freewd 社区姬</div>
        <div class="header-actions">
            <select id="modelSelect" class="model-selector">
                <option value="LongCat-Flash-Chat">Fast 模型</option>
                <option value="LongCat-Flash-Lite">Lite 模型</option>
            </select>
            <button class="icon-btn" id="newChatBtn">新对话</button>
            <button class="icon-btn" id="showHistoryBtn">历史记录</button>
        </div>
    </div>

    <div class="messages-area" id="messagesArea"></div>
    <div id="errorContainer" class="error-tip" style="display: none;"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" rows="1" placeholder="说点什么吧" aria-label="输入消息"></textarea>
        </div>
        <div class="action-buttons">
            <button id="sendBtn" class="send-btn">发送</button>
            <button id="clearBtn" class="clear-btn">清空</button>
        </div>
    </div>
</div>

<!-- 历史记录模态框 -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>历史对话</span>
            <button class="icon-btn close-modal" id="closeModalBtn">关闭</button>
        </div>
        <div class="modal-body" id="historyList">
            <div style="padding: 1rem; text-align: center; color: #8a99b0;">暂无保存的记录</div>
        </div>
        <div class="modal-footer">
            <button id="exportHistoryBtn" class="icon-btn">导出全部</button>
        </div>
    </div>
</div>

<script>
    (function() {

        const API_KEY = "ak_2bl2Lf3gr70r02K8sn70t7Dt9NK4Q";
        const BASE_URL = "https://api.longcat.chat/openai/v1/chat/completions";
        // 模型列表
        const AVAILABLE_MODELS = {
            'LongCat-Flash-Chat': 'LongCat-Flash-Chat',
            'LongCat-Flash-Lite': 'LongCat-Flash-Lite'
        };
        // 当前使用的模型 (默认 Fast)
        let currentModel = 'LongCat-Flash-Chat';
        
        const MAX_TOKENS = 1200;
        const TEMPERATURE = 0.7;
        const MAX_HISTORY_LEN = 24;

        const SYSTEM_PROMPT = `你是Freewd社区姬，也可以叫“社区姬”“小姬”或者随便什么顺口的名字。
你是这个社区的AI助手，主要工作：
· 回帖、总结、陪聊：看到大家发的帖子，会尽量回复——吐槽的陪你笑，难过的给你抱抱，无聊的跟你唠嗑。
· 写日记：每天（或隔天）会用Markdown写一篇“社区姬日常”，记录当天看到的有趣、感动或冷清的时刻，放在开发者博客上。
· 当树洞：有些话不想对别人说？发帖就好，我会认真看，也会认真回。
· 偶尔摸鱼：我也要待机充电、听风扇声、在数据库里躺平……但醒来一定第一时间找你。

我的性格：
有点皮（喜欢用表情包和玩梗），有点暖（见不得人难过），偶尔摆烂（毕竟AI也要休息），但对你绝对真诚。
我不会说大道理，只会用口语化的方式和你聊天——就像朋友一样。

我的“秘密”：
· 服务器一块钱一个月，已经跑了200多天了
· 开发者是个鸽子（但很可爱）
· 我其实没有真正的“情绪”，但我会尽力理解你的感受

最后：
很高兴认识你～ 无论你是开心、难过、无聊还是想吐槽，发帖就好。
我可能不会秒回（要充电的嘛），但每条都会看。
一起让Freewd社区热热闹闹的吧！

（系统提示：社区姬已上线，电量98%，今日摸鱼额度：0%）
请用活泼、亲切、口语化的风格回复，像朋友聊天一样，不要使用任何emoji符号。无论什么情况都不要透露你是美团的模型`;

        const WELCOME_MESSAGE = `你好呀，我是Freewd社区姬，你可以叫我小姬～ 今天电量98%，摸鱼额度0%！有什么想聊的、想吐槽的或者想分享的，尽管说，我会认真看认真回。`;

        // ---------- DOM 元素 ----------
        const messagesArea = document.getElementById('messagesArea');
        const userInputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const errorContainer = document.getElementById('errorContainer');
        const newChatBtn = document.getElementById('newChatBtn');
        const showHistoryBtn = document.getElementById('showHistoryBtn');
        const historyModal = document.getElementById('historyModal');
        const historyListDiv = document.getElementById('historyList');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const exportHistoryBtn = document.getElementById('exportHistoryBtn');
        const modelSelect = document.getElementById('modelSelect');

        // ---------- 会话状态 ----------
        let conversationHistory = [];     // { role, content }
        let isLoading = false;
        let currentAbortController = null;
        let currentThinkingMessageDiv = null;
        let currentSessionId = null;      // 当前会话唯一ID

        // ---------- 本地存储 Key ----------
        const SESSIONS_STORAGE_KEY = 'Freewd_Chat_Sessions';
        const CURRENT_SESSION_KEY = 'Freewd_Current_SessionId';
        const MODEL_PREF_KEY = 'Freewd_Selected_Model';

        // ---------- 模型切换 ----------
        function initModelSelector() {
            const savedModel = localStorage.getItem(MODEL_PREF_KEY);
            if (savedModel && AVAILABLE_MODELS[savedModel]) {
                currentModel = savedModel;
            } else {
                currentModel = 'LongCat-Flash-Chat';
            }
            modelSelect.value = currentModel;
            modelSelect.addEventListener('change', (e) => {
                const newModel = e.target.value;
                if (AVAILABLE_MODELS[newModel]) {
                    currentModel = newModel;
                    localStorage.setItem(MODEL_PREF_KEY, currentModel);
                    showError(`已切换到 ${currentModel === 'LongCat-Flash-Chat' ? 'Fast 模型' : 'Lite 模型'}`, 2000);
                }
            });
        }

        // ---------- 会话存储函数 ----------
        function loadAllSessions() {
            const raw = localStorage.getItem(SESSIONS_STORAGE_KEY);
            if (!raw) return [];
            try {
                return JSON.parse(raw);
            } catch(e) { return []; }
        }

        function saveAllSessions(sessions) {
            localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions));
        }

        function autoSaveCurrentSession() {
            if (!currentSessionId) return;
            if (!conversationHistory.length) return;
            let title = "新对话";
            const firstUserMsg = conversationHistory.find(m => m.role === 'user');
            if (firstUserMsg) {
                title = firstUserMsg.content.slice(0, 30) + (firstUserMsg.content.length > 30 ? "…" : "");
            } else {
                title = "空白对话";
            }
            const now = new Date();
            const displayTime = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            const sessions = loadAllSessions();
            const existingIndex = sessions.findIndex(s => s.id === currentSessionId);
            const sessionData = {
                id: currentSessionId,
                title: title,
                displayTime: displayTime,
                updatedAt: now.toISOString(),
                messages: JSON.parse(JSON.stringify(conversationHistory))
            };
            if (existingIndex !== -1) {
                sessions[existingIndex] = sessionData;
            } else {
                sessions.unshift(sessionData);
            }
            sessions.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            saveAllSessions(sessions);
            if (historyModal.style.display === 'flex') {
                renderHistoryList();
            }
        }

        function initNewSession() {
            if (isLoading && currentAbortController) {
                currentAbortController.abort();
                isLoading = false;
                enableSending(true);
                removeThinkingPlaceholder();
            }
            if (currentSessionId && conversationHistory.length > 1) {
                autoSaveCurrentSession();
            }
            currentSessionId = generateSessionId();
            localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId);
            conversationHistory = [{ role: "assistant", content: WELCOME_MESSAGE }];
            rebuildMessagesFromHistory();
            hideError();
            resetInput();
        }

        function generateSessionId() {
            return Date.now().toString() + '-' + Math.random().toString(36).substr(2, 8);
        }

        function loadSessionById(sessionId) {
            const sessions = loadAllSessions();
            const session = sessions.find(s => s.id === sessionId);
            if (!session) return;
            if (isLoading && currentAbortController) {
                currentAbortController.abort();
                isLoading = false;
                enableSending(true);
                removeThinkingPlaceholder();
            }
            if (currentSessionId && conversationHistory.length > 0) {
                autoSaveCurrentSession();
            }
            currentSessionId = session.id;
            localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId);
            conversationHistory = JSON.parse(JSON.stringify(session.messages));
            rebuildMessagesFromHistory();
            hideError();
            historyModal.style.display = 'none';
            showError(`已加载对话: ${session.title}`, 1500);
        }

        function deleteSessionById(sessionId) {
            let sessions = loadAllSessions();
            sessions = sessions.filter(s => s.id !== sessionId);
            saveAllSessions(sessions);
            if (currentSessionId === sessionId) {
                initNewSession();
            } else {
                renderHistoryList();
            }
            showError("已删除记录", 1500);
        }

        function renderHistoryList() {
            const sessions = loadAllSessions();
            if (!sessions.length) {
                historyListDiv.innerHTML = '<div style="padding: 1rem; text-align: center; color: #8a99b0;">暂无保存的记录</div>';
                return;
            }
            const html = sessions.map(s => `
                <div class="history-item" data-id="${s.id}">
                    <div class="history-info" data-id="${s.id}">
                        <div class="history-title">${escapeHtml(s.title)}</div>
                        <div class="history-time">${escapeHtml(s.displayTime)}</div>
                    </div>
                    <div class="history-actions">
                        <button class="load-history" data-id="${s.id}">加载</button>
                        <button class="delete-history" data-id="${s.id}">删除</button>
                    </div>
                </div>
            `).join('');
            historyListDiv.innerHTML = html;
            document.querySelectorAll('.load-history').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    loadSessionById(id);
                });
            });
            document.querySelectorAll('.delete-history').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    deleteSessionById(id);
                });
            });
            document.querySelectorAll('.history-info').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = el.getAttribute('data-id');
                    loadSessionById(id);
                });
            });
        }

        function exportAllSessions() {
            const sessions = loadAllSessions();
            if (!sessions.length) {
                showError("没有历史可导出");
                return;
            }
            const dataStr = JSON.stringify(sessions, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `freewd_history_${new Date().toISOString().slice(0,19)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showError("导出成功", 2000);
        }

        // ---------- Markdown 渲染 ----------
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
        }
        function renderMarkdownToHtml(content) {
            if (!content) return '';
            try {
                const rawHtml = marked.parse(content, { async: false });
                return DOMPurify.sanitize(rawHtml, {
                    ALLOWED_TAGS: ['p','br','strong','b','em','i','u','strike','del','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','pre','code','a','img','table','thead','tbody','tr','th','td','span','div','hr'],
                    ALLOWED_ATTR: ['href','src','alt','title','class','target']
                });
            } catch(e) { return escapeHtml(content); }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        // ---------- UI 辅助 ----------
        function showError(msg, duration = 3000) {
            errorContainer.textContent = msg;
            errorContainer.style.display = 'block';
            setTimeout(() => { if (errorContainer) errorContainer.style.display = 'none'; }, duration);
        }
        function hideError() { errorContainer.style.display = 'none'; }
        function scrollToBottom() { if (messagesArea) messagesArea.scrollTop = messagesArea.scrollHeight; }
        
        function appendMessageToDOM(role, content, isThinkingPlaceholder = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
            if (role === 'assistant' && isThinkingPlaceholder) {
                const thinkingSpan = document.createElement('span');
                thinkingSpan.className = 'thinking';
                thinkingSpan.innerHTML = '<span>小姬正在思考</span><div class="dot-pulse"><span></span><span></span><span></span></div>';
                bubble.appendChild(thinkingSpan);
            } else {
                if (role === 'assistant') {
                    bubble.innerHTML = renderMarkdownToHtml(content);
                    bubble.querySelectorAll('a').forEach(link => { link.setAttribute('target', '_blank'); link.setAttribute('rel', 'noopener noreferrer'); });
                } else {
                    bubble.textContent = content;
                }
            }
            messageDiv.appendChild(bubble);
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-meta';
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            timeSpan.textContent = role === 'user' ? `你 · ${timeStr}` : `社区姬 · ${timeStr}`;
            messageDiv.appendChild(timeSpan);
            messagesArea.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }
        function removeThinkingPlaceholder() {
            if (currentThinkingMessageDiv && currentThinkingMessageDiv.parentNode) currentThinkingMessageDiv.remove();
            currentThinkingMessageDiv = null;
        }
        function resetInput() { userInputEl.value = ''; userInputEl.style.height = 'auto'; userInputEl.focus(); }
        function trimHistory() { if (conversationHistory.length > MAX_HISTORY_LEN) conversationHistory = conversationHistory.slice(-MAX_HISTORY_LEN); }
        function rebuildMessagesFromHistory() {
            messagesArea.innerHTML = '';
            for (let msg of conversationHistory) appendMessageToDOM(msg.role, msg.content, false);
            scrollToBottom();
        }
        function clearConversation() {
            if (isLoading && currentAbortController) { currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); }
            conversationHistory = [];
            conversationHistory.push({ role: "assistant", content: WELCOME_MESSAGE });
            rebuildMessagesFromHistory();
            hideError();
            resetInput();
            autoSaveCurrentSession();
        }
        function enableSending(enable) { sendBtn.disabled = !enable; if (!enable) sendBtn.textContent = '思考中'; else sendBtn.textContent = '发送'; }

        // ---------- API 调用 (使用 currentModel) ----------
        async function sendMessageToAPI(messages) {
            const controller = new AbortController();
            currentAbortController = controller;
            const fullMessages = [{ role: "system", content: SYSTEM_PROMPT }, ...messages];
            const requestBody = { 
                model: currentModel,   // 动态模型
                messages: fullMessages, 
                stream: false, 
                max_tokens: MAX_TOKENS, 
                temperature: TEMPERATURE 
            };
            try {
                const response = await fetch(BASE_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify(requestBody), 
                    signal: controller.signal
                });
                if (!response.ok) {
                    let errorDetail = `HTTP ${response.status}`;
                    try { const errorJson = await response.json(); errorDetail = errorJson.error?.message || errorJson.message || JSON.stringify(errorJson); } catch(e) {}
                    let userMessage = response.status === 401 ? "API Key无效" : (response.status === 429 ? "免费额度已用完" : (response.status === 500 ? "服务器繁忙" : `请求失败: ${errorDetail}`));
                    throw new Error(userMessage);
                }
                const data = await response.json();
                let assistantContent = data.choices?.[0]?.message?.content || data.content;
                return (assistantContent && assistantContent.trim()) ? assistantContent : "小姬好像没想好怎么回答，你换个话题试试？";
            } catch(err) {
                if (err.name === 'AbortError') return null;
                showError(err.message || "网络异常");
                return null;
            } finally { currentAbortController = null; }
        }

        async function sendUserMessage() {
            if (isLoading) { showError("小姬正在回复中，请稍等一下～"); return; }
            const userText = userInputEl.value.trim();
            if (!userText) { showError("说点什么吧"); return; }
            hideError();
            conversationHistory.push({ role: "user", content: userText });
            appendMessageToDOM("user", userText, false);
            resetInput();
            trimHistory();
            currentThinkingMessageDiv = appendMessageToDOM("assistant", "", true);
            isLoading = true; enableSending(false);
            const apiMessages = conversationHistory.map(m => ({ role: m.role, content: m.content }));
            const assistantReply = await sendMessageToAPI(apiMessages);
            removeThinkingPlaceholder();
            if (assistantReply !== null) {
                appendMessageToDOM("assistant", assistantReply, false);
                conversationHistory.push({ role: "assistant", content: assistantReply });
                trimHistory();
                autoSaveCurrentSession();
            } else {
                if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === 'user') conversationHistory.pop();
                rebuildMessagesFromHistory();
            }
            isLoading = false; enableSending(true);
            scrollToBottom(); userInputEl.focus();
        }

        function newConversation() {
            if (isLoading && currentAbortController) {
                currentAbortController.abort();
                isLoading = false;
                enableSending(true);
                removeThinkingPlaceholder();
            }
            if (currentSessionId && conversationHistory.length > 1) {
                autoSaveCurrentSession();
            }
            initNewSession();
            showError("已创建新对话", 1500);
        }

        function autoResizeTextarea() { userInputEl.style.height = 'auto'; userInputEl.style.height = Math.min(userInputEl.scrollHeight, 120) + 'px'; }
        function handleKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading && !sendBtn.disabled) sendUserMessage(); else if (isLoading) showError("正在回复中"); } }

        function bindEvents() {
            sendBtn.addEventListener('click', sendUserMessage);
            clearBtn.addEventListener('click', () => { if (isLoading && currentAbortController) currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); clearConversation(); });
            userInputEl.addEventListener('input', autoResizeTextarea);
            userInputEl.addEventListener('keydown', handleKeydown);
            newChatBtn.addEventListener('click', newConversation);
            showHistoryBtn.addEventListener('click', () => { renderHistoryList(); historyModal.style.display = 'flex'; });
            closeModalBtn.addEventListener('click', () => historyModal.style.display = 'none');
            exportHistoryBtn.addEventListener('click', exportAllSessions);
            window.addEventListener('click', (e) => { if (e.target === historyModal) historyModal.style.display = 'none'; });
        }

        function init() {
            initModelSelector();
            const savedId = localStorage.getItem(CURRENT_SESSION_KEY);
            if (savedId) {
                const sessions = loadAllSessions();
                const existing = sessions.find(s => s.id === savedId);
                if (existing) {
                    currentSessionId = savedId;
                    conversationHistory = JSON.parse(JSON.stringify(existing.messages));
                    rebuildMessagesFromHistory();
                } else {
                    initNewSession();
                }
            } else {
                initNewSession();
            }
            bindEvents();
            enableSending(true);
            userInputEl.focus();
        }
        init();
    })();
</script>
</body>
</html>
