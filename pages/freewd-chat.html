<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>社区姬 · Freewd AI助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* ---------- 全局变量 ---------- */
        :root {
            --bg-body: #f5f7fb;
            --container-bg: #ffffff;
            --header-bg: rgba(255,255,255,0.96);
            --border-color: #e9eef3;
            --text-primary: #1e2a3e;
            --text-secondary: #6c7a8e;
            --bubble-user: #1e3a5f;
            --bubble-user-text: white;
            --bubble-assistant: #eef2f8;
            --bubble-assistant-text: #1f2a3e;
            --input-bg: #f2f5f9;
            --input-border: #e2e8f0;
            --icon-btn-bg: #eef2f8;
            --icon-btn-color: #2c3e50;
            --modal-bg: white;
            --error-bg: #fee9e6;
            --error-color: #c2410c;
            --shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            --thinking-bg: #f9f3e3;
            --thinking-border: #e6d5b8;
        }
        body.dark {
            --bg-body: #121826;
            --container-bg: #1e2432;
            --header-bg: rgba(30,36,50,0.96);
            --border-color: #2d3548;
            --text-primary: #eef2f8;
            --text-secondary: #9aaebb;
            --bubble-user: #3b5f8a;
            --bubble-user-text: #f0f4fa;
            --bubble-assistant: #2a3246;
            --bubble-assistant-text: #e2e8f0;
            --input-bg: #2a3246;
            --input-border: #3a4258;
            --icon-btn-bg: #2d3548;
            --icon-btn-color: #cbd5e1;
            --modal-bg: #1e2432;
            --error-bg: #3b2a2a;
            --error-color: #f87171;
            --shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            --thinking-bg: #2a2a1c;
            --thinking-border: #4a4a2a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, fill 0.2s ease;
        }
        body {
            background: var(--bg-body);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .chat-container {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            background: var(--container-bg);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .chat-header {
            background: var(--header-bg);
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .header-title span {
            font-size: 0.7rem;
            background: var(--icon-btn-bg);
            padding: 0.1rem 0.4rem;
            border-radius: 1rem;
            font-weight: normal;
            color: var(--text-secondary);
        }
        .header-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .icon-btn {
            background: var(--icon-btn-bg);
            border: none;
            border-radius: 2rem;
            width: 2.2rem;
            height: 2.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--icon-btn-color);
            fill: currentColor;
        }
        .icon-btn svg {
            width: 1.2rem;
            height: 1.2rem;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .history-icon svg { fill: currentColor; stroke: none; }
        .icon-btn:active { transform: scale(0.96); }
        .theme-icon svg { fill: currentColor; stroke: none; }
        .model-selector {
            background: var(--icon-btn-bg);
            border: none;
            border-radius: 2rem;
            padding: 0 0.8rem;
            height: 2.2rem;
            font-size: 0.75rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--icon-btn-color);
            cursor: pointer;
            outline: none;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--container-bg);
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: var(--border-color); border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb { background: #8a99b0; border-radius: 10px; }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .user-message { align-self: flex-end; }
        .assistant-message { align-self: flex-start; }
        .bubble {
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            line-height: 1.45;
            font-size: 0.95rem;
            word-break: break-word;
            white-space: normal;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }
        .assistant-bubble {
            background: var(--bubble-assistant);
            color: var(--bubble-assistant-text);
            border-bottom-left-radius: 0.25rem;
            overflow-x: auto;
        }
        .thinking-details {
            margin-bottom: 0.6rem;
            border-left: 3px solid var(--thinking-border);
            background: var(--thinking-bg);
            border-radius: 12px;
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
        }
        .thinking-details summary {
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .thinking-details summary::-webkit-details-marker { display: none; }
        .thinking-details summary::before { content: "🧠"; font-size: 1rem; }
        .thinking-content {
            margin-top: 0.5rem;
            padding-top: 0.4rem;
            border-top: 1px dashed var(--border-color);
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .assistant-bubble h1, .assistant-bubble h2, .assistant-bubble h3,
        .assistant-bubble h4, .assistant-bubble h5, .assistant-bubble h6 {
            margin: 0.5em 0 0.25em;
            font-weight: 600;
        }
        .assistant-bubble h1 { font-size: 1.3rem; }
        .assistant-bubble h2 { font-size: 1.2rem; }
        .assistant-bubble p { margin: 0.4em 0; }
        .assistant-bubble ul, .assistant-bubble ol { margin: 0.4em 0; padding-left: 1.5rem; }
        .assistant-bubble code {
            background: rgba(0,0,0,0.1);
            padding: 0.2rem 0.3rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
            color: #d0312d;
        }
        body.dark .assistant-bubble code { background: rgba(255,255,255,0.1); color: #f8a5c2; }
        .assistant-bubble pre {
            background: #1e2a3a;
            padding: 0.75rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.6em 0;
        }
        body.dark .assistant-bubble pre { background: #0f121c; }
        .assistant-bubble pre code { background: transparent; color: inherit; padding: 0; }
        .assistant-bubble blockquote { border-left: 3px solid var(--text-secondary); margin: 0.5em 0; padding-left: 0.8rem; color: var(--text-secondary); }
        .assistant-bubble a { color: #1e3a5f; text-decoration: underline; }
        body.dark .assistant-bubble a { color: #7aa2f7; }
        .assistant-bubble table { border-collapse: collapse; width: 100%; margin: 0.6em 0; }
        .assistant-bubble th, .assistant-bubble td { border: 1px solid var(--border-color); padding: 0.4rem; }
        .assistant-bubble th { background: var(--icon-btn-bg); }
        .user-bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 0.25rem;
        }
        .message-meta {
            font-size: 0.65rem;
            margin-top: 0.2rem;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
            color: var(--text-secondary);
        }
        .thinking {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .dot-pulse { display: inline-flex; gap: 3px; }
        .dot-pulse span {
            width: 6px; height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .dot-pulse span:nth-child(1) { animation-delay: 0s; }
        .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
        .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 60%, 100% { transform: scale(0.8); opacity: 0.5; }
            30% { transform: scale(1.2); opacity: 1; }
        }
        .input-area {
            background: var(--container-bg);
            border-top: 1px solid var(--border-color);
            padding: 0.7rem 1rem 1rem;
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: var(--input-bg);
            border-radius: 1.5rem;
            border: 1px solid var(--input-border);
            transition: all 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: var(--bubble-user);
            background: var(--container-bg);
            box-shadow: 0 0 0 2px rgba(30,58,95,0.2);
        }
        textarea {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.4;
            max-height: 100px;
            color: var(--text-primary);
        }
        textarea::placeholder { color: var(--text-secondary); }
        .action-buttons { display: flex; gap: 0.5rem; align-items: center; }
        .send-btn, .clear-btn {
            background: var(--bubble-user);
            border: none;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:active, .clear-btn:active { transform: scale(0.96); }
        .send-btn:disabled, .clear-btn:disabled { background: #b9c4d1; cursor: not-allowed; opacity: 0.7; }
        .clear-btn { background: var(--icon-btn-bg); color: var(--icon-btn-color); border: 1px solid var(--border-color); }
        .error-tip { background: var(--error-bg); color: var(--error-color); font-size: 0.7rem; padding: 0.3rem 0.8rem; border-radius: 1rem; margin: 0 1rem 0.3rem 1rem; text-align: center; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--modal-bg);
            width: 90%;
            max-width: 550px;
            max-height: 80vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--text-primary);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.3rem 0;
        }
        .history-item {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .history-info {
            flex: 1;
            cursor: pointer;
            min-width: 0;
        }
        .history-title {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .pin-symbol { font-size: 0.8rem; font-weight: normal; color: var(--text-secondary); }
        .history-time { font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.15rem; }
        .history-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
        .history-actions button {
            background: var(--icon-btn-bg);
            color: var(--icon-btn-color);
            padding: 0.25rem 0.5rem;
            font-size: 0.65rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
        }
        .modal-footer {
            padding: 0.6rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (min-width: 768px) {
            .chat-container { height: 90vh; border-radius: 28px; margin: 1.5rem; }
            .message { max-width: 75%; }
            .icon-btn { width: 2.4rem; height: 2.4rem; }
            .icon-btn svg { width: 1.3rem; height: 1.3rem; }
        }
        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .icon-btn { width: 2rem; height: 2rem; }
            .icon-btn svg { width: 1rem; height: 1rem; }
            .model-selector { font-size: 0.7rem; padding: 0 0.5rem; height: 2rem; }
            .header-title { font-size: 1rem; }
        }
    </style>
</head>

        const THINKING_EXTRA = `\n\n【重要指令】当你面对用户问题时，请先将你的推理、分析、思考过程完整地写在 <thinking>...</thinking> 标签内，然后在标签外给出最终回答。思考过程要详细，最终回答保持活泼亲切。`;
        const WELCOME_MESSAGE = `你好呀，我是Freewd社区姬，你可以叫我小姬～ 今天电量98%，摸鱼额度0%！有什么想聊的、想吐槽的或者想分享的，尽管说，我会认真看认真回。`;

        const messagesArea = document.getElementById('messagesArea');
        const userInputEl = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const errorContainer = document.getElementById('errorContainer');
        const newChatBtn = document.getElementById('newChatBtn');
        const showHistoryBtn = document.getElementById('showHistoryBtn');
        const historyModal = document.getElementById('historyModal');
        const historyListDiv = document.getElementById('historyList');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const exportHistoryBtn = document.getElementById('exportHistoryBtn');
        const modelSelect = document.getElementById('modelSelect');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIconSvg = document.getElementById('themeIcon');

        let conversationHistory = [];
        let isLoading = false;
        let currentAbortController = null;
        let currentThinkingMessageDiv = null;
        let currentSessionId = null;
        let currentModel = 'LongCat-Flash-Chat';

        const SESSIONS_STORAGE_KEY = 'Freewd_Chat_Sessions';
        const CURRENT_SESSION_KEY = 'Freewd_Current_SessionId';
        const MODEL_PREF_KEY = 'Freewd_Selected_Model';
        const THEME_KEY = 'Freewd_DarkMode';

        function getSystemPrompt() {
            if (currentModel === 'LongCat-Flash-Thinking') return BASE_SYSTEM_PROMPT + THINKING_EXTRA;
            return BASE_SYSTEM_PROMPT;
        }

        function renderAssistantContentWithThinking(rawContent) {
            if (!rawContent) return { html: '', hasThinking: false };
            const thinkingRegex = /<thinking>([\s\S]*?)<\/thinking>/gi;
            let match;
            let thinkingParts = [];
            let processedContent = rawContent;
            while ((match = thinkingRegex.exec(rawContent)) !== null) {
                thinkingParts.push(match[1].trim());
                processedContent = processedContent.replace(match[0], '');
            }
            if (thinkingParts.length === 0) return { html: renderMarkdownToHtml(rawContent), hasThinking: false };
            const thinkingHtml = thinkingParts.map(think => `<details class="thinking-details"><summary>🤔 思考过程</summary><div class="thinking-content">${renderMarkdownToHtml(think)}</div></details>`).join('');
            const finalAnswerHtml = renderMarkdownToHtml(processedContent.trim());
            return { html: thinkingHtml + finalAnswerHtml, hasThinking: true };
        }

        if (typeof marked !== 'undefined') marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
        function renderMarkdownToHtml(content) {
            if (!content) return '';
            try {
                const rawHtml = marked.parse(content, { async: false });
                return DOMPurify.sanitize(rawHtml, {
                    ALLOWED_TAGS: ['p','br','strong','b','em','i','u','strike','del','h1','h2','h3','h4','h5','h6','ul','ol','li','blockquote','pre','code','a','img','table','thead','tbody','tr','th','td','span','div','hr','details','summary'],
                    ALLOWED_ATTR: ['href','src','alt','title','class','target']
                });
            } catch(e) { return escapeHtml(content); }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
        function appendMessageToDOM(role, content, isThinkingPlaceholder = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
            if (role === 'assistant' && isThinkingPlaceholder) {
                bubble.innerHTML = '<span class="thinking">小姬正在思考<div class="dot-pulse"><span></span><span></span><span></span></div></span>';
            } else {
                if (role === 'assistant') {
                    const { html } = renderAssistantContentWithThinking(content);
                    bubble.innerHTML = html || renderMarkdownToHtml(content);
                    bubble.querySelectorAll('a').forEach(link => { link.target = '_blank'; link.rel = 'noopener noreferrer'; });
                } else bubble.textContent = content;
            }
            messageDiv.appendChild(bubble);
            const timeSpan = document.createElement('div'); timeSpan.className = 'message-meta';
            const now = new Date();
            timeSpan.textContent = `${role === 'user' ? '你' : '社区姬'} · ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            messageDiv.appendChild(timeSpan);
            messagesArea.appendChild(messageDiv);
            scrollToBottom();
            return messageDiv;
        }
        function removeThinkingPlaceholder() { if (currentThinkingMessageDiv?.parentNode) currentThinkingMessageDiv.remove(); currentThinkingMessageDiv = null; }
        function resetInput() { userInputEl.value = ''; userInputEl.style.height = 'auto'; userInputEl.focus(); }
        function trimHistory() { if (conversationHistory.length > MAX_HISTORY_LEN) conversationHistory = conversationHistory.slice(-MAX_HISTORY_LEN); }
        function rebuildMessagesFromHistory() { messagesArea.innerHTML = ''; conversationHistory.forEach(msg => appendMessageToDOM(msg.role, msg.content, false)); scrollToBottom(); }
        function clearConversation() { if (isLoading && currentAbortController) { currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); } conversationHistory = [{ role: "assistant", content: WELCOME_MESSAGE }]; rebuildMessagesFromHistory(); hideError(); resetInput(); autoSaveCurrentSession(); }
        function enableSending(enable) { sendBtn.disabled = !enable; sendBtn.textContent = enable ? '发送' : '思考中'; }
        function showError(msg, duration = 3000) { errorContainer.textContent = msg; errorContainer.style.display = 'block'; setTimeout(() => { if (errorContainer) errorContainer.style.display = 'none'; }, duration); }
        function hideError() { errorContainer.style.display = 'none'; }

        async function sendMessageToAPI(messages) {
            const controller = new AbortController();
            currentAbortController = controller;
            const systemPrompt = getSystemPrompt();
            const fullMessages = [{ role: "system", content: systemPrompt }, ...messages];
            const requestBody = {
                model: currentModel,
                messages: fullMessages,
                stream: false,
                max_tokens: MAX_TOKENS,
                temperature: TEMPERATURE
            };
            try {
                const resp = await fetch(BASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });
                if (!resp.ok) {
                    let errorDetail = '';
                    try {
                        const errorData = await resp.json();
                        errorDetail = JSON.stringify(errorData);
                    } catch(e) {
                        errorDetail = await resp.text();
                    }
                    console.error('API Error Response:', errorDetail);
                    throw new Error(`HTTP ${resp.status}: ${errorDetail.slice(0, 200)}`);
                }
                const data = await resp.json();
                return data.choices?.[0]?.message?.content || "小姬没听清，再试一次？";
            } catch(err) {
                if (err.name !== 'AbortError') showError(err.message);
                return null;
            } finally {
                currentAbortController = null;
            }
        }

        async function sendUserMessage() {
            if (isLoading) { showError("正在回复中"); return; }
            const userText = userInputEl.value.trim();
            if (!userText) { showError("说点什么吧"); return; }
            hideError();
            conversationHistory.push({ role: "user", content: userText });
            appendMessageToDOM("user", userText, false);
            resetInput(); trimHistory();
            currentThinkingMessageDiv = appendMessageToDOM("assistant", "", true);
            isLoading = true; enableSending(false);
            const reply = await sendMessageToAPI(conversationHistory.map(m => ({ role: m.role, content: m.content })));
            removeThinkingPlaceholder();
            if (reply) {
                appendMessageToDOM("assistant", reply, false);
                conversationHistory.push({ role: "assistant", content: reply });
                trimHistory();
                autoSaveCurrentSession();
            } else {
                if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === 'user') conversationHistory.pop();
                rebuildMessagesFromHistory();
            }
            isLoading = false; enableSending(true);
            scrollToBottom(); userInputEl.focus();
        }

        // 会话管理函数
        function loadAllSessions() { const raw = localStorage.getItem(SESSIONS_STORAGE_KEY); if (!raw) return []; try { return JSON.parse(raw); } catch(e) { return []; } }
        function saveAllSessions(sessions) { localStorage.setItem(SESSIONS_STORAGE_KEY, JSON.stringify(sessions)); }
        function autoSaveCurrentSession() { if (!currentSessionId) return; if (!conversationHistory.length) return; let title = "新对话"; const firstUserMsg = conversationHistory.find(m => m.role === 'user'); if (firstUserMsg) title = firstUserMsg.content.slice(0, 28) + (firstUserMsg.content.length > 28 ? "…" : ""); const now = new Date(); const displayTime = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`; let sessions = loadAllSessions(); const existingIndex = sessions.findIndex(s => s.id === currentSessionId); const sessionData = { id: currentSessionId, title, displayTime, updatedAt: now.toISOString(), pinned: false, messages: JSON.parse(JSON.stringify(conversationHistory)) }; if (existingIndex !== -1) { sessionData.pinned = sessions[existingIndex].pinned || false; sessions[existingIndex] = sessionData; } else { sessions.unshift(sessionData); } sessions.sort((a,b) => { if (a.pinned && !b.pinned) return -1; if (!a.pinned && b.pinned) return 1; return new Date(b.updatedAt) - new Date(a.updatedAt); }); saveAllSessions(sessions); if (historyModal.style.display === 'flex') renderHistoryList(); }
        function renameSession(sessionId, newTitle) { let sessions = loadAllSessions(); const idx = sessions.findIndex(s => s.id === sessionId); if (idx !== -1) { sessions[idx].title = newTitle.slice(0, 40); sessions[idx].updatedAt = new Date().toISOString(); saveAllSessions(sessions); renderHistoryList(); showError("标题已更新", 1000); } }
        function togglePinSession(sessionId) { let sessions = loadAllSessions(); const idx = sessions.findIndex(s => s.id === sessionId); if (idx !== -1) { sessions[idx].pinned = !sessions[idx].pinned; sessions[idx].updatedAt = new Date().toISOString(); sessions.sort((a,b) => { if (a.pinned && !b.pinned) return -1; if (!a.pinned && b.pinned) return 1; return new Date(b.updatedAt) - new Date(a.updatedAt); }); saveAllSessions(sessions); renderHistoryList(); showError(sessions[idx].pinned ? "已置顶" : "已取消置顶", 1000); } }
        function initNewSession() { if (isLoading && currentAbortController) { currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); } if (currentSessionId && conversationHistory.length > 1) autoSaveCurrentSession(); currentSessionId = Date.now().toString() + '-' + Math.random().toString(36).substr(2, 8); localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId); conversationHistory = [{ role: "assistant", content: WELCOME_MESSAGE }]; rebuildMessagesFromHistory(); hideError(); resetInput(); }
        function loadSessionById(sessionId) { const sessions = loadAllSessions(); const session = sessions.find(s => s.id === sessionId); if (!session) return; if (isLoading && currentAbortController) { currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); } if (currentSessionId && conversationHistory.length > 0) autoSaveCurrentSession(); currentSessionId = session.id; localStorage.setItem(CURRENT_SESSION_KEY, currentSessionId); conversationHistory = JSON.parse(JSON.stringify(session.messages)); rebuildMessagesFromHistory(); hideError(); historyModal.style.display = 'none'; showError(`已加载对话: ${session.title}`, 1500); }
        function deleteSessionById(sessionId) { let sessions = loadAllSessions(); sessions = sessions.filter(s => s.id !== sessionId); saveAllSessions(sessions); if (currentSessionId === sessionId) initNewSession(); else renderHistoryList(); showError("已删除记录", 1500); }
        function renderHistoryList() { const sessions = loadAllSessions(); if (!sessions.length) { historyListDiv.innerHTML = '<div style="padding: 1rem; text-align: center; color: var(--text-secondary);">暂无保存的记录</div>'; return; } const html = sessions.map(s => `<div class="history-item" data-id="${s.id}"><div class="history-info" data-id="${s.id}"><div class="history-title">${s.pinned ? '<span class="pin-symbol">↑</span>' : ''}<span class="title-text" data-id="${s.id}">${escapeHtml(s.title)}</span></div><div class="history-time">${escapeHtml(s.displayTime)}</div></div><div class="history-actions"><button class="rename-history" data-id="${s.id}">命名</button><button class="pin-history" data-id="${s.id}">${s.pinned ? '取消' : '置顶'}</button><button class="load-history" data-id="${s.id}">加载</button><button class="delete-history" data-id="${s.id}">删</button></div></div>`).join(''); historyListDiv.innerHTML = html; document.querySelectorAll('.load-history').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); loadSessionById(btn.getAttribute('data-id')); }); }); document.querySelectorAll('.delete-history').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); deleteSessionById(btn.getAttribute('data-id')); }); }); document.querySelectorAll('.pin-history').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); togglePinSession(btn.getAttribute('data-id')); }); }); document.querySelectorAll('.rename-history').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); const id = btn.getAttribute('data-id'); const titleSpan = document.querySelector(`.history-title .title-text[data-id="${id}"]`); const currentTitle = titleSpan ? titleSpan.innerText : ""; const newTitle = prompt("输入新标题:", currentTitle); if (newTitle && newTitle.trim()) renameSession(id, newTitle.trim()); }); }); document.querySelectorAll('.history-info').forEach(el => { el.addEventListener('click', (e) => { const id = el.getAttribute('data-id'); loadSessionById(id); }); }); }
        function exportAllSessions() { const sessions = loadAllSessions(); if (!sessions.length) { showError("没有历史可导出"); return; } const dataStr = JSON.stringify(sessions, null, 2); const blob = new Blob([dataStr], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `freewd_history_${new Date().toISOString().slice(0,19)}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showError("导出成功", 2000); }
        function newConversation() { if (isLoading && currentAbortController) { currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); } if (currentSessionId && conversationHistory.length > 1) autoSaveCurrentSession(); initNewSession(); showError("已创建新对话", 1500); }

        function updateThemeIcon() { const isDark = document.body.classList.contains('dark'); if (isDark) { themeIconSvg.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor" stroke="none"/>`; } else { themeIconSvg.innerHTML = `<circle cx="12" cy="12" r="5" fill="currentColor"/><line x1="12" y1="1" x2="12" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="12" y1="20" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="20" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`; } }
        function setThemeBasedOnSystem() { const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches; const saved = localStorage.getItem(THEME_KEY); if (saved !== null) { if (saved === 'true') document.body.classList.add('dark'); else document.body.classList.remove('dark'); } else { if (prefersDark) document.body.classList.add('dark'); else document.body.classList.remove('dark'); } updateThemeIcon(); }
        function toggleTheme() { const isDark = document.body.classList.contains('dark'); if (isDark) { document.body.classList.remove('dark'); localStorage.setItem(THEME_KEY, 'false'); } else { document.body.classList.add('dark'); localStorage.setItem(THEME_KEY, 'true'); } updateThemeIcon(); }
        function initModelSelector() { const saved = localStorage.getItem(MODEL_PREF_KEY); if (saved && (saved === 'LongCat-Flash-Chat' || saved === 'LongCat-Flash-Lite' || saved === 'LongCat-Flash-Thinking' || saved === 'LongCat-Flash-Chat-2602-Exp')) currentModel = saved; modelSelect.value = currentModel; modelSelect.addEventListener('change', (e) => { currentModel = e.target.value; localStorage.setItem(MODEL_PREF_KEY, currentModel); showError(`已切换到 ${modelSelect.options[modelSelect.selectedIndex].text}`, 1500); }); }
        function autoResizeTextarea() { userInputEl.style.height = 'auto'; userInputEl.style.height = Math.min(userInputEl.scrollHeight, 100) + 'px'; }
        function handleKeydown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) sendUserMessage(); else showError("请等待回复完成"); } }
        function bindEvents() { sendBtn.addEventListener('click', sendUserMessage); clearBtn.addEventListener('click', () => { if (isLoading && currentAbortController) currentAbortController.abort(); isLoading = false; enableSending(true); removeThinkingPlaceholder(); clearConversation(); }); userInputEl.addEventListener('input', autoResizeTextarea); userInputEl.addEventListener('keydown', handleKeydown); newChatBtn.addEventListener('click', newConversation); showHistoryBtn.addEventListener('click', () => { renderHistoryList(); historyModal.style.display = 'flex'; }); closeModalBtn.addEventListener('click', () => historyModal.style.display = 'none'); exportHistoryBtn.addEventListener('click', exportAllSessions); window.addEventListener('click', (e) => { if (e.target === historyModal) historyModal.style.display = 'none'; }); themeToggleBtn.addEventListener('click', toggleTheme); }
        function init() { setThemeBasedOnSystem(); initModelSelector(); const savedId = localStorage.getItem(CURRENT_SESSION_KEY); const sessions = loadAllSessions(); const existing = sessions.find(s => s.id === savedId); if (existing) { currentSessionId = savedId; conversationHistory = JSON.parse(JSON.stringify(existing.messages)); rebuildMessagesFromHistory(); } else initNewSession(); bindEvents(); enableSending(true); userInputEl.focus(); }
        init();
    })();
</script>
